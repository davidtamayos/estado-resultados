*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',sans-serif;background:var(--gris-bg);color:var(--negro);line-height:1.5;color-scheme:light}
.container{max-width:1600px;margin:0 auto;padding:24px}

.header h1{font-size:28px;font-weight:600;color:white;margin-bottom:8px}
.header-meta{display:flex;gap:20px;font-size:12px;color:rgba(255,255,255,.85);flex-wrap:wrap;margin-top:12px}
.mes-selector{background:var(--blanco);padding:16px 20px;border-radius:6px;margin-bottom:24px;border:1px solid var(--gris-border);display:flex;gap:12px;align-items:center}
.mes-selector label{font-size:12px;text-transform:uppercase;font-weight:700;color:var(--verde-jd);letter-spacing:.3px}
.mes-selector select{padding:8px 12px;border:1px solid var(--gris-border);border-radius:4px;font-size:13px;cursor:pointer;background:white;color:var(--negro)}
.summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-bottom:32px}
.card{background:var(--blanco);padding:20px;border-radius:8px;border:1px solid var(--gris-border);border-left:3px solid var(--verde-jd)}
.card-label{font-size:11px;text-transform:uppercase;color:var(--gris-text);margin-bottom:8px;font-weight:700;letter-spacing:.3px}
.card-value{font-size:24px;font-weight:700;color:var(--verde-jd)}
.card-value.negative{color:var(--rojo)}
.linea{background:var(--blanco);border:1px solid var(--gris-border);border-radius:8px;padding:20px;margin-bottom:20px}
.linea-title{font-size:18px;font-weight:700;color:var(--verde-jd);border-bottom:2px solid var(--verde-jd);padding-bottom:12px;margin-bottom:16px}
.conceptos{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px}
.concepto{background:var(--gris-bg);padding:12px;border-radius:6px;border:1px solid var(--gris-border)}
.concepto-title{font-size:11px;text-transform:uppercase;font-weight:700;color:var(--gris-text);margin-bottom:8px;letter-spacing:.3px}
.valor{font-size:12px;display:flex;justify-content:space-between;margin-bottom:4px;padding:4px 0}
.valor-label{color:var(--gris-text);font-weight:600}
.valor-numero{color:var(--verde-jd);font-weight:700}
.valor-numero.negative{color:var(--rojo)}
.footer{border-top:2px solid var(--gris-border);padding-top:24px;margin-top:32px;text-align:center;font-size:12px;color:var(--gris-text)}
.disclaimer{background:#f5f5f5;border:1px solid var(--gris-border);border-radius:6px;padding:12px;margin-top:16px;font-size:11px;color:#666;text-align:center}
.insights-section{background:linear-gradient(135deg,#f0f7ee 0%,#fefbf0 100%);border-left:4px solid var(--verde-jd);padding:16px;margin-bottom:24px;border-radius:6px}
.insights-title{font-size:14px;font-weight:700;color:var(--verde-jd);margin-bottom:12px}
.insight-item{font-size:12px;line-height:1.6;margin-bottom:8px;color:#333}
.insight-item:before{content:"• ";color:var(--verde-jd);font-weight:700;margin-right:6px}
.linea-insight{font-size:12px;line-height:1.6;padding:12px;margin-top:12px;background:rgba(54,124,43,0.05);border-left:3px solid var(--amarillo-jd);border-radius:4px}
.linea-insight-list{list-style:none;padding:0;margin:0}
.linea-insight-list li{margin-bottom:8px;padding-left:20px;position:relative;font-size:12px;line-height:1.6;color:#333}
.linea-insight-list li:before{content:"• ";position:absolute;left:0;color:var(--verde-jd);font-weight:700}
.insight-critical-alert{background:#fee;border-left:4px solid var(--rojo);padding:10px;margin-bottom:8px;border-radius:4px;font-size:12px;line-height:1.6}
.recommendation{background:#f0f7ee;border-left:4px solid var(--verde-jd);padding:10px;margin-bottom:8px;border-radius:4px;font-size:12px;line-height:1.6}

function getMesActual(){
  const meses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  const hoy=new Date();
  return meses[hoy.getMonth()];
}

let mesCurrent=getMesActual();
let modoActual='individual';
const ordenMeses=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];

function getDataAcumulada(meshasta){
  const indexHasta=ordenMeses.indexOf(meshasta);
  if(indexHasta<0) return datos[meshasta];
  const datosAcumulados={mes:`Enero a ${meshasta.charAt(0).toUpperCase()+meshasta.slice(1)} 2026 (Acumulado)`,totales:{ventas:0,bruta:0,gastos:0,operacional:0},lineas:{}};
  for(let i=0;i<=indexHasta;i++){
    const m=ordenMeses[i];
    if(!datos[m]) continue;
    const d=datos[m];
    datosAcumulados.totales.ventas+=d.totales.ventas;
    datosAcumulados.totales.bruta+=d.totales.bruta;
    datosAcumulados.totales.gastos+=d.totales.gastos;
    datosAcumulados.totales.operacional+=d.totales.operacional;
    d.lineas.forEach(l=>{
      if(!datosAcumulados.lineas[l.nombre]){
        datosAcumulados.lineas[l.nombre]={nombre:l.nombre,ventas:{real:0,proy:0,y2025:0},mg:{real:0,proy:0,y2025:0},gastos:{real:0,proy:0,y2025:0},util:{real:0,proy:0,y2025:0}};
      }
      datosAcumulados.lineas[l.nombre].ventas.real+=l.ventas.real;
      datosAcumulados.lineas[l.nombre].ventas.proy+=l.ventas.proy;
      datosAcumulados.lineas[l.nombre].ventas.y2025+=l.ventas.y2025;
      datosAcumulados.lineas[l.nombre].gastos.real+=l.gastos.real;
      datosAcumulados.lineas[l.nombre].gastos.proy+=l.gastos.proy;
      datosAcumulados.lineas[l.nombre].gastos.y2025+=l.gastos.y2025;
      datosAcumulados.lineas[l.nombre].util.real+=l.util.real;
      datosAcumulados.lineas[l.nombre].util.proy+=l.util.proy;
      datosAcumulados.lineas[l.nombre].util.y2025+=l.util.y2025;
    });
  }
  datosAcumulados.lineas=Object.values(datosAcumulados.lineas);
  datosAcumulados.lineas.forEach(l=>{
    const ventasReal=l.ventas.real;
    const ventasProy=l.ventas.proy;
    const ventas2025=l.ventas.y2025;
    if(ventasReal>0) l.mg.real=(l.ventas.real>0?(l.util.real+l.gastos.real)/l.ventas.real*100:0);
    if(ventasProy>0) l.mg.proy=(ventasProy>0?(l.util.proy+l.gastos.proy)/ventasProy*100:0);
    if(ventas2025>0) l.mg.y2025=(ventas2025>0?(l.util.y2025+l.gastos.y2025)/ventas2025*100:0);
  });
  return datosAcumulados;
}

function generarInsightsGenerales(d){
  const v=d.totales.ventas;
  const vp=d.totales.operacional;
  const lineasPositivas=d.lineas.filter(l=>l.util.real>0).length;
  const lineasNegativas=d.lineas.filter(l=>l.util.real<0).length;
  const mejorLinea=d.lineas.reduce((a,b)=>a.util.real>b.util.real?a:b);
  const peorLinea=d.lineas.reduce((a,b)=>a.util.real<b.util.real?a:b);

  const gastosTotales=d.totales.gastos;
  const gastosPorVenta=(gastosTotales/v*100).toFixed(1);
  const esCritico=vp<0 || lineasNegativas>4;

  let html='<div style="margin-top:12px;">';

  // Contexto
  html+=`<div style="font-size:11px;color:#666;margin-bottom:12px;font-style:italic;">Nota: Datos al día actual vs Proyección (mes cerrado) y Real 2025 (mes cerrado)</div>`;

  // Insight crítico si aplica
  if(esCritico){
    html+=`<div class="insight-critical-alert">CRÍTICO: ${vp<0?'Grupo en rojo. Utilidad negativa de $'+formatNumero(Math.abs(vp))+'. Los gastos ('+gastosPorVenta+'% de ventas) están comprometiendo rentabilidad.':'Desbalance severo: '+lineasNegativas+' líneas en déficit. Rentabilidad concentrada en pocas líneas.'}</div>`;
  }

  // Insight 1: Desempeño operacional
  html+=`<div class="insight-item">Desempeño Operacional: Grupo con utilidad ${vp<0?'negativa':'positiva'} de $${formatNumero(Math.abs(vp))}. Gastos departamentales de ${gastosPorVenta}% sobre ventas ${vp<0?'están comprimiendo toda la bruta':'comparten espacio con margen'}. La estructura de costos ${vp<0?'requiere revisión urgente':'tiene margen de optimización'}.</div>`;

  // Insight 2: Distribución de rentabilidad
  const porcentajePositivas=(lineasPositivas/9*100).toFixed(0);
  html+=`<div class="insight-item">Cartera de Negocios: ${lineasPositivas}/9 líneas (${porcentajePositivas}%) rentables, ${lineasNegativas} en rojo. ${mejorLinea.nombre} contribuye $${formatNumero(mejorLinea.util.real)}, mientras ${peorLinea.nombre} resta $${formatNumero(Math.abs(peorLinea.util.real))}. Distribución desigual indica desalineación en asignación de capital.</div>`;

  // Insight 3: Oportunidades
  html+=`<div class="insight-item">Oportunidades: ${vp<0?'Prioridad inmediata en líneas deficitarias. Evaluar continuidad o reestructura operativa.':'Consolidar líneas positivas mientras se resuelve rentabilidad en déficit. Mix desequilibrado limita potencial.'}</div>`;

  // Recomendaciones estratégicas
  html+=`<div style="margin-top:16px;border-top:1px solid #ddd;padding-top:12px;"><strong style="color:var(--verde-jd);font-size:12px;">Recomendaciones Grupo:</strong>`;
  html+=`<div class="recommendation">1. ${vp<0?'Revisión inmediata de estructura de gastos fijos. Identificar oportunidades de reducción de 15-20% en próximas 4 semanas.':'Análisis de rentabilidad por SKU/cliente en líneas positivas para identificar oportunidades de margen. Objetivo: +2% en Q3.'}</div>`;
  html+=`<div class="recommendation">2. ${vp<0?'Evaluar viabilidad de líneas deficitarias. Plan de acción (optimizar, pivotar o discontinuar) en 2 semanas.':'Diagnóstico de causas en líneas en rojo. Implementar plan de corrección (producto, pricing o gestión) en 3 semanas.'}</div>`;
  html+='</div></div>';

  return html;
}

function generarInsightLinea(ln){
  const desv=((ln.ventas.real-ln.ventas.proy)*100/ln.ventas.proy).toFixed(1);
  const varYoY=((ln.ventas.real-ln.ventas.y2025)*100/ln.ventas.y2025).toFixed(1);
  const esCritica=ln.util.real<0 || Math.abs(desv)>30;

  let insights=[];
  let indiceCritico=-1;

  // Insight 1: Desempeño vs proyección
  if(Math.abs(desv)<10){
    insights.push({texto:`Ventas de $${formatNumero(ln.ventas.real)} están en línea con proyección (desviación ${desv}%). La ejecución se alinea con lo planeado.`,critico:false});
  }else if(desv<-20){
    insights.push({texto:`Ventas reales de $${formatNumero(ln.ventas.real)} están significativamente por debajo de proyección $${formatNumero(ln.ventas.proy)} (-${Math.abs(desv)}%). Hay brecha importante que requiere investigación en demanda o capacidad de ejecución.`,critico:true});
    indiceCritico=0;
  }else if(desv>20){
    insights.push({texto:`Ventas de $${formatNumero(ln.ventas.real)} superan proyección $${formatNumero(ln.ventas.proy)} (+${desv}%). Desempeño encima de lo esperado, pero validar si es sostenible o efecto puntual.`,critico:false});
  }else{
    insights.push({texto:`Ventas de $${formatNumero(ln.ventas.real)} versus proyección $${formatNumero(ln.ventas.proy)} muestran desviación moderada (${desv}%). Hay variabilidad que requiere seguimiento.`,critico:false});
  }

  // Insight 2: Eficiencia de margen
  if(ln.mg.real<ln.mg.proy*0.85){
    insights.push({texto:`Margen del ${ln.mg.real}% está por debajo de proyección ${ln.mg.proy}%, lo que indica presión de costos o pricing débil. Hay erosión en la eficiencia operativa de esta línea.`,critico:true});
    if(indiceCritico<0) indiceCritico=1;
  }else if(ln.mg.real>ln.mg.proy*1.15){
    insights.push({texto:`Margen del ${ln.mg.real}% supera proyección ${ln.mg.proy}%. Control de costos está funcionando bien, hay oportunidad de escalar volumen sin sacrificar rentabilidad.`,critico:false});
  }else{
    insights.push({texto:`Margen del ${ln.mg.real}% está alineado con proyección ${ln.mg.proy}%. Control operativo es consistente.`,critico:false});
  }

  // Insight 3: Comparativa histórica y rentabilidad
  if(ln.util.real<0){
    insights.push({texto:`Genera pérdida de $${formatNumero(Math.abs(ln.util.real))} (vs $${formatNumero(ln.ventas.y2025)} en ventas año pasado, ${varYoY}%). Línea en rojo: requiere decisión si ajustar operación o evaluar continuidad.`,critico:true});
    if(indiceCritico<0) indiceCritico=2;
  }else if(varYoY<-15){
    insights.push({texto:`Utilidad de $${formatNumero(ln.util.real)}, pero ventas cayeron ${varYoY}% vs año pasado. Hay contracción histórica que señala pérdida de participación o cambio en demanda.`,critico:true});
    if(indiceCritico<0) indiceCritico=2;
  }else if(varYoY>15){
    insights.push({texto:`Utilidad de $${formatNumero(ln.util.real)}, con crecimiento de ventas de +${varYoY}% vs año pasado. Trayectoria positiva: línea ganando participación y rentabilidad.`,critico:false});
  }else{
    insights.push({texto:`Utilidad de $${formatNumero(ln.util.real)}, con evolución estable vs año pasado (${varYoY}%). Posición consistente.`,critico:false});
  }

  let html='<ul class="linea-insight-list">';
  insights.forEach((insight,idx)=>{
    if(idx===indiceCritico){
      html+=`<li><strong style="color:var(--rojo);">CRÍTICO: </strong>${insight.texto}</li>`;
    }else{
      html+=`<li>${insight.texto}</li>`;
    }
  });
  html+='</ul>';
  return html;
}

function renderizar(){
  const d=modoActual==='acumulado'?getDataAcumulada(mesCurrent):datos[mesCurrent];
  const tipoVisualizacion=modoActual==='acumulado'?'(Acumulado)':'(Individual)';
  document.getElementById('periodo').textContent=`Período: ${d.mes.includes('Acumulado')?d.mes:`${d.mes} ${tipoVisualizacion}`}`;

  // Calcular totales de proyección y 2025
  let ventasProy=0, ventas2025=0, gastosProy=0, gastos2025=0, utilProy=0, util2025=0;
  let brutaProy=0, bruta2025=0;

  d.lineas.forEach(l=>{
    ventasProy+=Number(l.ventas.proy)||0;
    ventas2025+=Number(l.ventas.y2025)||0;
    gastosProy+=Number(l.gastos.proy)||0;
    gastos2025+=Number(l.gastos.y2025)||0;
    utilProy+=Number(l.util.proy)||0;
    util2025+=Number(l.util.y2025)||0;
    brutaProy+=(Number(l.ventas.proy)||0)*(Number(l.mg.proy)||0)/100;
    bruta2025+=(Number(l.ventas.y2025)||0)*(Number(l.mg.y2025)||0)/100;
  });

  let brutaMgReal='0.00', brutaMgProy='0.00', brutaMg2025='0.00';
  let gastosPctReal='0.00', gastosPctProy='0.00', gastosPct2025='0.00';

  if(d.totales.ventas>0){
    brutaMgReal=((d.totales.bruta/d.totales.ventas)*100).toFixed(2);
    gastosPctReal=((d.totales.gastos/d.totales.ventas)*100).toFixed(2);
  }
  if(ventasProy>0){
    brutaMgProy=((brutaProy/ventasProy)*100).toFixed(2);
    gastosPctProy=((gastosProy/ventasProy)*100).toFixed(2);
  }
  if(ventas2025>0){
    brutaMg2025=((bruta2025/ventas2025)*100).toFixed(2);
    gastosPct2025=((gastos2025/ventas2025)*100).toFixed(2);
  }

  // Líneas críticas y estrella
  const lineasEnRojo=d.lineas.filter(l=>l.util.real<0);
  const mejorLinea=d.lineas.reduce((a,b)=>a.util.real>b.util.real?a:b);
  const superacionMejor=((mejorLinea.util.real-mejorLinea.util.proy)*100/mejorLinea.util.proy).toFixed(1);

  const summary=`
    <div class="card">
      <div class="card-label">Ventas Netas</div>
      <div class="card-value">$${formatNumero(d.totales.ventas)}<span style="font-size:16px;color:#6c757d;margin-left:8px;">${((d.totales.ventas/ventasProy)*100).toFixed(1)}%</span></div>
      <div style="font-size:11px;color:#666;margin-top:6px;">Real: $${formatNumero(d.totales.ventas)} | Proy: $${formatNumero(ventasProy)} | 2025: $${formatNumero(ventas2025)}</div>
    </div>
    <div class="card">
      <div class="card-label">Margen Bruto %</div>
      <div class="card-value">${brutaMgReal}%</div>
      <div style="font-size:11px;color:#666;margin-top:6px;">Real: ${brutaMgReal}% | Proy: ${brutaMgProy}% | 2025: ${brutaMg2025}%</div>
    </div>
    <div class="card">
      <div class="card-label">Gastos Departamento</div>
      <div class="card-value">${gastosPctReal}%</div>
      <div style="font-size:11px;color:#666;margin-top:6px;">Real: $${formatNumero(d.totales.gastos)} | Proy: $${formatNumero(gastosProy)} | 2025: $${formatNumero(gastos2025)}</div>
    </div>
    <div class="card">
      <div class="card-label">Utilidad Operacional</div>
      <div class="card-value ${d.totales.operacional<0?'negative':''}">$${formatNumero(d.totales.operacional)}</div>
      <div style="font-size:11px;color:#666;margin-top:6px;">Real: $${formatNumero(d.totales.operacional)} | Proy: $${formatNumero(utilProy)} | 2025: $${formatNumero(util2025)}</div>
    </div>
    <div class="card">
      <div class="card-label">Líneas Críticas</div>
      <div class="card-value ${lineasEnRojo.length>0?'negative':''}">${lineasEnRojo.length}</div>
      <div style="font-size:11px;color:#666;margin-top:6px;">${lineasEnRojo.length>0?lineasEnRojo.map(l=>l.nombre).join(', '):'Sin líneas en rojo'}</div>
    </div>
    <div class="card">
      <div class="card-label">Línea Estrella</div>
      <div class="card-value">${mejorLinea.nombre}</div>
      <div style="font-size:11px;color:#666;margin-top:6px;">Util: $${formatNumero(mejorLinea.util.real)} | ${superacionMejor<0?'':'+'}${superacionMejor}% vs proy</div>
    </div>
  `;
  document.getElementById('summaryContainer').innerHTML=summary;

  // Insights generales
  const insightsGen=generarInsightsGenerales(d);
  document.getElementById('insightsContent').innerHTML=insightsGen;

  const lineas=d.lineas.map(ln=>`
    <div class="linea">
      <div class="linea-title">${ln.nombre}</div>
      <div class="conceptos">
        <div class="concepto">
          <div class="concepto-title">Ventas Netas</div>
          <div class="valor"><span class="valor-label">Real:</span><span class="valor-numero">$${formatNumero(ln.ventas.real)}</span><span style="font-size:11px;color:#6c757d;margin-left:4px;">${((ln.ventas.real/ln.ventas.proy)*100).toFixed(1)}%</span></div>
          <div class="valor"><span class="valor-label">Proy:</span><span class="valor-numero">$${formatNumero(ln.ventas.proy)}</span></div>
          <div class="valor"><span class="valor-label">2025:</span><span class="valor-numero">$${formatNumero(ln.ventas.y2025)}</span></div>
        </div>
        <div class="concepto">
          <div class="concepto-title">Margen Bruto %</div>
          <div class="valor"><span class="valor-label">Real:</span><span class="valor-numero">${ln.mg.real.toFixed(2)}%</span></div>
          <div class="valor"><span class="valor-label">Proy:</span><span class="valor-numero">${ln.mg.proy.toFixed(2)}%</span></div>
          <div class="valor"><span class="valor-label">2025:</span><span class="valor-numero">${ln.mg.y2025.toFixed(2)}%</span></div>
        </div>
        <div class="concepto">
          <div class="concepto-title">Gastos Dept</div>
          <div class="valor"><span class="valor-label">Real:</span><span class="valor-numero">$${formatNumero(ln.gastos.real)}</span></div>
          <div class="valor"><span class="valor-label">G/V:</span><span class="valor-numero ${(ln.gastos.real/ln.ventas.real*100)>(ln.gastos.proy/ln.ventas.proy*100)?'negative':''}">${ ((ln.gastos.real/ln.ventas.real)*100).toFixed(1)}%</span></div>
          <div class="valor"><span class="valor-label">Proy:</span><span class="valor-numero">$${formatNumero(ln.gastos.proy)}</span></div>
          <div class="valor"><span class="valor-label">G/V:</span><span class="valor-numero">${((ln.gastos.proy/ln.ventas.proy)*100).toFixed(1)}%</span></div>
          <div class="valor"><span class="valor-label">2025:</span><span class="valor-numero">$${formatNumero(ln.gastos.y2025)}</span></div>
          <div class="valor"><span class="valor-label">G/V:</span><span class="valor-numero">${((ln.gastos.y2025/ln.ventas.y2025)*100).toFixed(1)}%</span></div>
        </div>
        <div class="concepto">
          <div class="concepto-title">Util. Operacional</div>
          <div class="valor"><span class="valor-label">Real:</span><span class="valor-numero ${ln.util.real<0?'negative':''}">$${formatNumero(ln.util.real)}</span></div>
          <div class="valor"><span class="valor-label">Proy:</span><span class="valor-numero ${ln.util.proy<0?'negative':''}">$${formatNumero(ln.util.proy)}</span></div>
          <div class="valor"><span class="valor-label">2025:</span><span class="valor-numero ${ln.util.y2025<0?'negative':''}">$${formatNumero(ln.util.y2025)}</span></div>
        </div>
      </div>
      <div class="linea-insight" style="margin-top:16px;">${generarInsightLinea(ln)}</div>
    </div>
  `).join('');
  document.getElementById('lineasContainer').innerHTML=lineas;

  const h=new Date();
  const f=h.toLocaleDateString('es-MX',{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'2-digit',minute:'2-digit'});
  document.getElementById('lastUpdate').textContent=`Actualizado: ${f}`;
}

document.getElementById('mesSelector').addEventListener('change',(e)=>{mesCurrent=e.target.value;renderizar();});
document.querySelectorAll('input[name="modo"]').forEach(radio=>{
  radio.addEventListener('change',(e)=>{modoActual=e.target.value;renderizar();});
});
document.addEventListener('DOMContentLoaded',renderizar);
</script>
